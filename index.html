<!DOCTYPE html>
<html>
<head>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Unic Elevators</title>
</head>
<body style="background:#0b1220;color:white;font-family:sans-serif">

<h2>UNIC ELEVATORS</h2>

<!-- CUSTOMER -->
<div>
  <h3>Create Ticket</h3>
  <input id="name" placeholder="Name"><br><br>
  <input id="phone" placeholder="Phone"><br><br>
  <button onclick="createTicket()">Submit</button>
  <p id="ticketId"></p>
</div>

<hr>

<!-- TECHNICIAN -->
<div>
  <h3>Technician Dashboard</h3>
  <button onclick="loadTickets()">🔄 Refresh</button>
  <div id="list"></div>
</div>

<script type="module">
import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-app.js";
import { getDatabase, ref, push, onValue } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-database.js";

/* 🔴 USE SAME CONFIG IN BOTH PHONES */
const firebaseConfig = {
  apiKey: "AIzaSyA8Ge3WFWVJiLEoNJnmlStgThzA70eixAU",
  authDomain: "unic-elevators-2c01c.firebaseapp.com",
  databaseURL: "https://unic-elevators-2c01c-default-rtdb.asia-southeast1.firebasedatabase.app",
  projectId: "unic-elevators-2c01c"
};

const app = initializeApp(firebaseConfig);
const db = getDatabase(app);
const ticketsRef = ref(db, "tickets");

/* CREATE TICKET */
window.createTicket = async () => {
  const name = document.getElementById("name").value;
  const phone = document.getElementById("phone").value;

  if (!name || !phone) {
    alert("Enter details");
    return;
  }

  const id = Math.floor(10000 + Math.random()*90000);

  await push(ticketsRef, {
    id,
    name,
    phone,
    status: "pending",
    created: Date.now()
  });

  document.getElementById("ticketId").innerText = "Ticket ID: " + id;
};

/* REALTIME LISTENER (THIS IS THE KEY FIX) */
function loadTickets() {
  onValue(ticketsRef, (snapshot) => {
    const data = snapshot.val();

    const list = document.getElementById("list");
    list.innerHTML = "";

    if (!data) {
      list.innerHTML = "No tickets";
      return;
    }

    Object.values(data).forEach(t => {
      // ✅ IMPORTANT: DO NOT FILTER ANYTHING
      list.innerHTML += `
        <div style="padding:10px;margin:10px;background:#1c2740;border-radius:8px">
          <b>ID:</b> ${t.id}<br>
          <b>Name:</b> ${t.name}<br>
          <b>Phone:</b> ${t.phone}<br>
          <b>Status:</b> ${t.status}
        </div>
      `;
    });
  });
}

/* AUTO LOAD */
loadTickets();

</script>

</body>
</html>
