<script type="module">
import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-app.js";
import { 
  getDatabase, ref, push, onValue, update, serverTimestamp 
} from "https://www.gstatic.com/firebasejs/10.12.0/firebase-database.js";

import { 
  getAuth, signInWithEmailAndPassword, onAuthStateChanged 
} from "https://www.gstatic.com/firebasejs/10.12.0/firebase-auth.js";

// 🔥 CONFIG
const firebaseConfig = {
  apiKey: "AIzaSyA8Ge...",
  authDomain: "unic-elevators-2c01c.firebaseapp.com",
  databaseURL: "https://unic-elevators-2c01c-default-rtdb.asia-southeast1.firebasedatabase.app",
  projectId: "unic-elevators-2c01c"
};

const app = initializeApp(firebaseConfig);
const db = getDatabase(app);
const auth = getAuth(app);

// =======================
// 🔐 LOGIN (REAL)
// =======================
window.handleLogin = async () => {
  const email = document.getElementById('login-name').value;
  const pass = document.getElementById('login-pass').value;

  try {
    const user = await signInWithEmailAndPassword(auth, email, pass);

    CURRENT_USER_NAME = user.user.email;

    if (email.includes("admin")) {
      gotoScreen('scr-admin');
    } else {
      gotoScreen('scr-tech');
    }

  } catch (e) {
    alert("Login Failed");
  }
};

// =======================
// 🚀 SUBMIT TICKET + ANALYTICS
// =======================
window.submitTicket = async () => {
  const n = inp('inp-name');
  const p = inp('inp-phone');

  if (!n || !p) return alert("Fill required");

  toggleLoader(true, "SYNCING...");

  const id = Math.floor(10000 + Math.random()*90000).toString();

  const ticket = {
    id,
    name: n,
    phone: p,
    type: ACTIVE_TYPE,
    status: "pending",
    created: Date.now(),
    updatedAt: serverTimestamp()
  };

  await push(ref(db, "tickets"), ticket);

  // 📊 UPDATE ANALYTICS
  update(ref(db, "stats"), {
    total: increment(1),
    pending: increment(1)
  });

  toggleLoader(false);
  document.getElementById('new-id').innerText = id;
  gotoScreen('scr-success');
};

// =======================
// 🔔 LIVE TECH DASHBOARD
// =======================
function startTechListener() {

  const list = document.getElementById('tech-list');

  onValue(ref(db, "tickets"), snap => {

    const tickets = [];

    snap.forEach(c => tickets.push({ key:c.key, ...c.val() }));

    list.innerHTML = "";

    tickets.forEach(t => {

      if (t.status === "pending") {
        playBeep(); // 🔔 ALERT
      }

      list.innerHTML += `
        <div class="card">
          <b>${t.name}</b>
          <p>${t.phone}</p>
          <span>${t.status}</span>

          <button onclick="updateStatus('${t.key}','assigned')">
            CLAIM
          </button>
        </div>
      `;
    });

  });
}

// 🔔 SOUND ALERT
function playBeep() {
  const audio = new Audio("https://actions.google.com/sounds/v1/alarms/beep_short.ogg");
  audio.play();
}

// =======================
// 📊 ADMIN DASHBOARD ANALYTICS
// =======================
function startAdminListener() {

  const list = document.getElementById('admin-list');

  onValue(ref(db, "tickets"), snap => {

    let total=0, pending=0, completed=0;

    snap.forEach(c => {
      const t = c.val();
      total++;

      if (t.status === "pending") pending++;
      if (t.status === "completed") completed++;
    });

    // 📊 RENDER DASHBOARD
    list.innerHTML = `
      <div class="card">
        <h2>📊 Dashboard</h2>
        <p>Total: ${total}</p>
        <p>Pending: ${pending}</p>
        <p>Completed: ${completed}</p>
      </div>
    `;
  });
}

// =======================
// 🔁 STATUS UPDATE
// =======================
window.updateStatus = async (key, next) => {

  await update(ref(db, "tickets/" + key), {
    status: next,
    updatedAt: serverTimestamp()
  });

};

// =======================
// HELPERS
// =======================
function inp(id){ return document.getElementById(id).value.trim(); }

// AUTO START LISTENERS
const oldRender = window.renderScreen;
window.renderScreen = (id) => {
  oldRender(id);

  if (id === 'scr-tech') startTechListener();
  if (id === 'scr-admin') startAdminListener();
};

</script>
