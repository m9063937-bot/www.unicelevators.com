<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width,initial-scale=1.0,maximum-scale=1.0,user-scalable=no"/>
<title>Unic Elevators</title>
<link rel="preconnect" href="https://fonts.googleapis.com" crossorigin/>
<link href="https://fonts.googleapis.com/css2?family=Barlow+Condensed:wght@800;900&family=Noto+Sans+Telugu:wght@400;700&family=Plus+Jakarta+Sans:wght@400;500;600;700&display=swap" rel="stylesheet"/>

<style>
:root {
  --r: #9B1111; --g: #F0A500; --n: #060d1f; --n2: #0d1628;
  --tx: #f0f4ff; --t2: #a8b4cf; --br: rgba(255,255,255,0.08);
  --blue: #4285F4; --green: #22c55e;
}
* { box-sizing: border-box; margin: 0; padding: 0; -webkit-tap-highlight-color: transparent; }
body { background: var(--n); color: var(--tx); font-family: 'Plus Jakarta Sans', sans-serif; overflow-x: hidden; }

.screen { display: none; padding: 20px; min-height: 100vh; }
.screen.active { display: block; }

header { padding: 15px 20px; background: rgba(6,13,31,0.95); border-bottom: 1px solid var(--br); display: flex; align-items: center; justify-content: space-between; position: sticky; top: 0; z-index: 100; backdrop-filter: blur(8px); }
.btn-back { background: var(--n2); border: 1px solid var(--br); color: var(--tx); padding: 8px 12px; border-radius: 8px; font-size: 13px; cursor: pointer; }
.logo { font-family: 'Barlow Condensed', sans-serif; font-weight: 900; font-size: 20px; color: var(--g); letter-spacing: 1px; }

.card { background: var(--n2); border: 1px solid var(--br); border-radius: 16px; padding: 20px; margin-bottom: 15px; }
.btn-main { width: 100%; padding: 16px; border-radius: 12px; border: none; font-weight: 700; cursor: pointer; margin-bottom: 12px; font-size: 16px; transition: 0.2s; }
.btn-primary { background: var(--r); color: white; }
.btn-outline { background: var(--n2); color: var(--tx); border: 1px solid var(--br); }
.btn-emergency { background: #fee2e2; color: #991b1b; border: 2px solid #f87171; }

input, textarea { width: 100%; padding: 12px; background: var(--n); border: 1px solid var(--br); border-radius: 8px; color: white; margin-bottom: 15px; font-size: 16px; font-family: inherit; }
label { font-size: 12px; color: var(--t2); display: block; margin-bottom: 4px; }

.badge { padding: 4px 10px; border-radius: 20px; font-size: 10px; font-weight: bold; text-transform: uppercase; }
.st-pending { background: rgba(255,255,255,0.1); color: white; }
.st-assigned { background: rgba(66, 133, 244, 0.2); color: var(--blue); }
.st-reached { background: rgba(240, 165, 0, 0.2); color: var(--g); }
.st-completed { background: rgba(34, 197, 94, 0.2); color: var(--green); }

#loader { position: fixed; inset: 0; background: rgba(6,13,31,0.9); display: none; align-items: center; justify-content: center; z-index: 2000; flex-direction: column; }
.spinner { width: 40px; height: 40px; border: 4px solid var(--g); border-top-color: transparent; border-radius: 50%; animation: spin 0.8s linear infinite; }
@keyframes spin { to { transform: rotate(360deg); } }

.gps-msg { font-size: 11px; text-align: center; margin-bottom: 15px; font-weight: 600; padding: 5px; border-radius: 4px; }
.gps-err { background: rgba(155, 17, 17, 0.1); color: #ff6b6b; }
.gps-ok { background: rgba(34, 197, 94, 0.1); color: var(--green); }
</style>
</head>
<body>

<div id="loader"><div class="spinner"></div><p style="margin-top:15px; color:var(--g); letter-spacing:2px; font-size:10px;">SAVING...</p></div>

<header id="main-header" style="display:none">
  <button class="btn-back" onclick="navBack()">← BACK</button>
  <div class="logo">UNIC ELEVATORS</div>
  <div style="width:40px"></div>
</header>

<!-- START SCREEN: Language -->
<div id="scr-lang" class="screen active">
  <div style="text-align:center; margin-top:100px;">
    <h1 style="font-size:36px; color:var(--g); font-family:'Barlow Condensed'">UNIC ELEVATORS</h1>
    <p style="margin-bottom:40px; color:var(--t2)">Choose Language / భాష</p>
    <button class="btn-main btn-outline" onclick="setLang('en')">ENGLISH</button>
    <button class="btn-main btn-outline" style="font-family:'Noto Sans Telugu'" onclick="setLang('te')">తెలుగు</button>
  </div>
</div>

<!-- ROLE SELECTION -->
<div id="scr-role" class="screen">
  <div style="text-align:center; margin-top:50px;">
    <h2 id="txt-roleTitle">Select User Type</h2>
    <div style="margin-top:30px">
      <button class="btn-main btn-outline" onclick="gotoScreen('scr-customer-menu')">Customer</button>
      <button class="btn-main btn-outline" onclick="openLogin('tech')">Technician</button>
      <button class="btn-main btn-primary" onclick="openLogin('admin')">Admin Panel</button>
    </div>
  </div>
</div>

<!-- LOGIN SCREEN -->
<div id="scr-login" class="screen">
  <div class="card" style="max-width:400px; margin: 40px auto;">
    <h2 id="txt-login">Login</h2>
    <div style="margin-top:20px">
      <label>Your Name</label>
      <input type="text" id="login-name" placeholder="Enter your full name">
      <label>Password</label>
      <input type="password" id="login-pass" placeholder="Enter password">
      <button class="btn-main btn-primary" onclick="handleLogin()">Login</button>
      <p id="login-err" style="color:#ff6b6b; text-align:center; display:none; font-size:12px;">Incorrect Password</p>
    </div>
  </div>
</div>

<!-- CUSTOMER INTERFACE -->
<div id="scr-customer-menu" class="screen">
  <div style="text-align:center; margin-top:40px;">
    <h2 id="txt-custMenu">Customer Portal</h2>
    <button class="btn-main btn-primary" style="margin-top:30px" onclick="gotoScreen('scr-file-complaint')">File a Complaint</button>
    <button class="btn-main btn-outline" onclick="gotoScreen('scr-track-complaint')">Track My Complaint</button>
  </div>
</div>

<div id="scr-file-complaint" class="screen">
  <div class="card">
    <h2 id="txt-formTitle">Service Selection</h2>
    <button class="btn-main btn-outline" style="margin-top:20px" onclick="openForm('installation')">New Lift Installation</button>
    <button class="btn-main btn-outline" onclick="openForm('service')">Monthly Service Request</button>
    <button class="btn-main btn-emergency" onclick="openForm('emergency')">⚠️ EMERGENCY (Lift Stuck)</button>
  </div>
</div>

<div id="scr-details-form" class="screen">
  <div class="card">
    <h2 id="disp-type-name" style="color:var(--g)">Details</h2>
    <div style="margin-top:20px">
      <label>Full Name</label><input type="text" id="inp-name">
      <label>Mobile Number</label><input type="tel" id="inp-phone">
      <label>Address</label><textarea id="inp-addr" rows="3"></textarea>
      <label>Remarks</label><textarea id="inp-issue" rows="2"></textarea>
      
      <button id="btn-loc" class="btn-main btn-outline" onclick="getLocation()" style="color:var(--blue); border-color:var(--blue)">
        📍 Share My Location (GPS)
      </button>
      <div id="loc-status" class="gps-msg" style="display:none"></div>
      
      <button class="btn-main btn-primary" onclick="submitTicket()">Submit Request</button>
    </div>
  </div>
</div>

<div id="scr-track-complaint" class="screen">
  <div class="card">
    <h2 id="txt-trackTitle">Track Progress</h2>
    <input type="text" id="inp-track-val" placeholder="ID or Mobile Number" style="margin-top:20px">
    <button class="btn-main btn-primary" onclick="trackTicket()">Track Now</button>
  </div>
  <div id="track-result"></div>
</div>

<!-- TECHNICIAN DASHBOARD -->
<div id="scr-tech" class="screen">
  <div style="display:flex; justify-content:space-between; align-items:center">
    <h3>Assignments</h3>
    <span id="tech-user-tag" style="font-size:12px; color:var(--g)"></span>
  </div>
  <div id="tech-list" style="margin-top:20px"></div>
</div>

<!-- ADMIN DASHBOARD -->
<div id="scr-admin" class="screen">
  <div style="display:flex; justify-content:space-between; align-items:center">
    <h3>Admin Control</h3>
    <span id="admin-user-tag" style="font-size:12px; color:var(--g)"></span>
  </div>
  <div id="admin-list" style="margin-top:20px"></div>
</div>

<div id="scr-success" class="screen">
  <div style="text-align:center; padding-top:60px">
    <h2 style="color:var(--green)">REGISTERED!</h2>
    <div class="card" style="margin-top:30px">
      <p style="font-size:12px; color:var(--t2)">YOUR TRACKING ID</p>
      <h1 id="new-id" style="font-size:48px; color:var(--g)">00000</h1>
    </div>
    <button class="btn-main btn-primary" style="margin-top:20px" onclick="gotoScreen('scr-role')">CLOSE</button>
  </div>
</div>

<script>
/* ── LOCAL STORAGE HELPERS ── */
const STORE_KEY = 'unic_tickets';

function loadTickets() {
  try { return JSON.parse(localStorage.getItem(STORE_KEY)) || []; }
  catch(e) { return []; }
}

function saveTickets(tickets) {
  localStorage.setItem(STORE_KEY, JSON.stringify(tickets));
}

/* ── APP STATE ── */
let LANG = 'en';
let HISTORY = ['scr-lang'];
let COORDS = null;
let TICKETS = loadTickets();
let ACTIVE_TYPE = 'service';
let LOGIN_ROLE = '';
let CURRENT_USER_NAME = '';

const T = {
  en: { roleTitle: "Select User Type", custMenu: "Customer Portal", formTitle: "Service Selection", trackTitle: "Track Complaint", login: "Login", installation: "New Installation", service: "Monthly Service", emergency: "EMERGENCY" },
  te: { roleTitle: "యూజర్ రకాన్ని ఎంచుకోండి", custMenu: "కస్టమర్ పోర్టల్", formTitle: "సర్వీస్ ఎంపిక", trackTitle: "ట్రాకింగ్", login: "లాగిన్", installation: "కొత్త ఇన్‌స్టాలేషన్", service: "నెలవారీ సర్వీస్", emergency: "అత్యవసర అభ్యర్థన" }
};

/* ── NAVIGATION ── */
window.setLang = function(l) { LANG = l; updateText(); gotoScreen('scr-role'); };
window.gotoScreen = function(id) { HISTORY.push(id); renderScreen(id); };
window.navBack = function() { if(HISTORY.length > 1) { HISTORY.pop(); renderScreen(HISTORY[HISTORY.length-1]); } };

window.renderScreen = function(id) {
  document.querySelectorAll('.screen').forEach(s => s.classList.remove('active'));
  document.getElementById(id).classList.add('active');
  document.getElementById('main-header').style.display = (id === 'scr-lang') ? 'none' : 'flex';
  if(id === 'scr-tech') renderTech();
  if(id === 'scr-admin') renderAdmin();
  window.scrollTo(0,0);
};

/* ── LOGIN ── */
window.openLogin = function(role) {
  LOGIN_ROLE = role;
  document.getElementById('login-err').style.display = 'none';
  document.getElementById('login-name').value = '';
  document.getElementById('login-pass').value = '';
  gotoScreen('scr-login');
};

window.handleLogin = function() {
  const n = document.getElementById('login-name').value.trim();
  const p = document.getElementById('login-pass').value;
  if(!n) { alert("Enter your name"); return; }
  
  if((LOGIN_ROLE==='tech' && p==='1111') || (LOGIN_ROLE==='admin' && p==='2222')) {
    CURRENT_USER_NAME = n;
    document.getElementById(LOGIN_ROLE==='tech' ? 'tech-user-tag' : 'admin-user-tag').innerText = "User: " + n;
    gotoScreen('scr-' + LOGIN_ROLE);
  } else {
    document.getElementById('login-err').style.display = 'block';
  }
};

/* ── GPS ── */
window.getLocation = function() {
  const status = document.getElementById('loc-status');
  status.style.display = 'block';
  status.className = 'gps-msg';
  status.innerText = "ACCESSING GPS...";
  
  navigator.geolocation.getCurrentPosition(
    (pos) => {
      COORDS = { lat: pos.coords.latitude, lng: pos.coords.longitude };
      status.innerText = "Location Captured Successfully ✓";
      status.className = 'gps-msg gps-ok';
      document.getElementById('btn-loc').style.borderColor = "var(--green)";
    },
    () => {
      status.innerText = "GPS Error: Please enable location and try again.";
      status.className = 'gps-msg gps-err';
    },
    { enableHighAccuracy: true, timeout: 8000 }
  );
};

/* ── TICKET OPERATIONS ── */
window.openForm = function(type) {
  ACTIVE_TYPE = type;
  document.getElementById('disp-type-name').innerText = T[LANG][type];
  gotoScreen('scr-details-form');
};

window.submitTicket = function() {
  const n = document.getElementById('inp-name').value.trim();
  const p = document.getElementById('inp-phone').value.trim();
  if(!n || !p) { alert("Name and Phone required"); return; }

  toggleLoader(true);

  const id = Math.floor(10000 + Math.random() * 90000).toString();
  const ticket = {
    docId: 'local_' + Date.now(),
    id, name: n, phone: p, type: ACTIVE_TYPE,
    addr: document.getElementById('inp-addr').value,
    issue: document.getElementById('inp-issue').value,
    status: 'pending',
    lat: COORDS?.lat || null,
    lng: COORDS?.lng || null,
    created: Date.now()
  };

  // Small delay to show the loader briefly, then save
  setTimeout(() => {
    TICKETS.push(ticket);
    saveTickets(TICKETS);
    document.getElementById('new-id').innerText = id;
    clearInputs();
    toggleLoader(false);
    gotoScreen('scr-success');
  }, 600);
};

window.trackTicket = function() {
  const val = document.getElementById('inp-track-val').value.trim();
  const res = document.getElementById('track-result');
  const tk = TICKETS.find(t => t.id === val || t.phone === val);
  res.innerHTML = !tk
    ? `<p style="text-align:center; color:#ff6b6b; margin-top:20px">No record found.</p>`
    : `<div class="card" style="border-left:4px solid var(--g); margin-top:20px">
        <div style="display:flex; justify-content:space-between"><b>ID: #${tk.id}</b> <span class="badge st-${tk.status}">${tk.status}</span></div>
        <p style="margin-top:8px; font-size:13px"><b>Name:</b> ${tk.name}</p>
        <p style="margin-top:4px; font-size:13px"><b>Type:</b> ${tk.type.toUpperCase()}</p>
        <p style="margin-top:4px; font-size:13px"><b>Status:</b> ${tk.status.toUpperCase()}</p>
        ${tk.addr ? `<p style="margin-top:4px; font-size:12px; color:var(--t2)">${tk.addr}</p>` : ''}
      </div>`;
};

window.updateStatus = function(docId, next) {
  toggleLoader(true);
  const idx = TICKETS.findIndex(t => t.docId === docId);
  if(idx > -1) {
    TICKETS[idx].status = next;
    TICKETS[idx].updatedBy = CURRENT_USER_NAME;
    saveTickets(TICKETS);
  }
  setTimeout(() => {
    toggleLoader(false);
    renderTech();
  }, 400);
};

/* ── RENDERERS ── */
function renderTech() {
  const list = document.getElementById('tech-list');
  TICKETS = loadTickets(); // refresh from storage
  const active = TICKETS.filter(t => t.status !== 'completed').sort((a,b) => b.created - a.created);
  list.innerHTML = active.length ? '' : '<p style="text-align:center; margin-top:40px; color:var(--t2)">No assignments.</p>';
  active.forEach(tk => {
    const next = tk.status==='pending'?'assigned':tk.status==='assigned'?'reached':'completed';
    const btnText = tk.status==='pending'?'CLAIM TASK':tk.status==='assigned'?'MARK REACHED':'COMPLETE TASK';
    list.innerHTML += `
      <div class="card">
        <div style="display:flex; justify-content:space-between; margin-bottom:10px">
          <span class="badge" style="font-size:9px; background:rgba(255,255,255,0.08)">${tk.type.toUpperCase()}</span>
          <span class="badge st-${tk.status}">${tk.status}</span>
        </div>
        <h3>${tk.name}</h3>
        <p style="font-size:12px; color:var(--t2); margin-top:4px">${tk.addr || 'No address'}</p>
        <p style="font-size:12px; color:var(--t2); margin-top:2px">📞 ${tk.phone}</p>
        ${tk.lat ? `<button class="btn-main" style="background:#1a2333; color:var(--blue); margin-top:10px" onclick="window.open('https://www.google.com/maps?q=${tk.lat},${tk.lng}')">📍 NAVIGATE</button>` : ''}
        <button class="btn-main btn-primary" style="margin-top:10px" onclick="updateStatus('${tk.docId}', '${next}')">${btnText}</button>
      </div>`;
  });
}

function renderAdmin() {
  const list = document.getElementById('admin-list');
  TICKETS = loadTickets(); // refresh from storage
  list.innerHTML = TICKETS.length ? '' : '<p style="text-align:center; color:var(--t2)">No tickets yet.</p>';
  [...TICKETS].sort((a,b) => b.created - a.created).forEach(tk => {
    list.innerHTML += `
      <div class="card" style="padding:12px; display:flex; justify-content:space-between; align-items:center">
        <div>
          <b>${tk.name}</b>
          <div style="font-size:10px; color:var(--t2)">#${tk.id} · ${tk.type} · ${tk.phone}</div>
          ${tk.addr ? `<div style="font-size:10px; color:var(--t2); margin-top:2px">${tk.addr}</div>` : ''}
        </div>
        <span class="badge st-${tk.status}">${tk.status}</span>
      </div>`;
  });
}

function updateText() {
  for(let id in T[LANG]) {
    const el = document.getElementById('txt-' + id);
    if(el) el.innerText = T[LANG][id];
  }
}

function toggleLoader(s) {
  document.getElementById('loader').style.display = s ? 'flex' : 'none';
}

function clearInputs() {
  ['inp-name','inp-phone','inp-addr','inp-issue'].forEach(i => {
    const e = document.getElementById(i);
    if(e) e.value = "";
  });
  COORDS = null;
  document.getElementById('loc-status').style.display = 'none';
  document.getElementById('btn-loc').style.borderColor = "var(--blue)";
}
</script>
</body>
</html>
